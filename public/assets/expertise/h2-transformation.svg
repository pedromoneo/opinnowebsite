<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#F8F9FA"/>
  <!-- Subtle circles pattern -->
  <g opacity="0.06">
    <circle cx="200" cy="250" r="180" stroke="#1B2B4B" stroke-width="1"/>
    <circle cx="400" cy="250" r="180" stroke="#1B2B4B" stroke-width="1"/>
    <circle cx="600" cy="250" r="180" stroke="#1B2B4B" stroke-width="1"/>
  </g>
  <!-- Transformation arrows / gears -->
  <g transform="translate(300, 150)">
    <!-- Left gear -->
    <circle cx="60" cy="100" r="50" stroke="#1B2B4B" stroke-width="4" fill="none" opacity="0.15"/>
    <circle cx="60" cy="100" r="20" fill="#FF6B35" opacity="0.2"/>
    <!-- Gear teeth -->
    <rect x="48" y="42" width="24" height="14" rx="3" fill="#1B2B4B" opacity="0.12"/>
    <rect x="48" y="144" width="24" height="14" rx="3" fill="#1B2B4B" opacity="0.12"/>
    <rect x="2" y="88" width="14" height="24" rx="3" fill="#1B2B4B" opacity="0.12"/>
    <rect x="104" y="88" width="14" height="24" rx="3" fill="#1B2B4B" opacity="0.12"/>
  </g>
  <!-- Arrow connecting -->
  <path d="M420 250 L480 250" stroke="#FF6B35" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <polygon points="480,242 498,250 480,258" fill="#FF6B35" opacity="0.6"/>
  <!-- Right shape - transformed -->
  <g transform="translate(500, 160)">
    <rect x="0" y="0" width="120" height="180" rx="12" stroke="#FF6B35" stroke-width="4" fill="none" opacity="0.4"/>
    <!-- People icons -->
    <circle cx="40" cy="50" r="12" fill="#FF6B35" opacity="0.5"/>
    <circle cx="80" cy="50" r="12" fill="#FF6B35" opacity="0.7"/>
    <circle cx="60" cy="90" r="12" fill="#FF6B35" opacity="0.6"/>
    <!-- Connection lines -->
    <line x1="40" y1="62" x2="60" y2="78" stroke="#1B2B4B" stroke-width="2" opacity="0.2"/>
    <line x1="80" y1="62" x2="60" y2="78" stroke="#1B2B4B" stroke-width="2" opacity="0.2"/>
    <!-- Progress bars -->
    <rect x="20" y="120" width="80" height="6" rx="3" fill="#1B2B4B" opacity="0.1"/>
    <rect x="20" y="120" width="60" height="6" rx="3" fill="#FF6B35" opacity="0.5"/>
    <rect x="20" y="140" width="80" height="6" rx="3" fill="#1B2B4B" opacity="0.1"/>
    <rect x="20" y="140" width="45" height="6" rx="3" fill="#FF6B35" opacity="0.4"/>
    <rect x="20" y="160" width="80" height="6" rx="3" fill="#1B2B4B" opacity="0.1"/>
    <rect x="20" y="160" width="70" height="6" rx="3" fill="#FF6B35" opacity="0.6"/>
  </g>
  <!-- Label -->
  <text x="400" y="440" font-family="system-ui, sans-serif" font-size="16" fill="#1B2B4B" text-anchor="middle" font-weight="600" letter-spacing="3" opacity="0.3">H2 TRANSFORMATION</text>
</svg>